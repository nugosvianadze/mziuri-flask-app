<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Detail</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="page">
    <div class="shell">
        <section class="hero">
            <div>
                <span class="pill">Post detail</span>
                <h1>Notes from the morning ferry</h1>
                <p>Static template for a single post view with a place to show views.</p>
                <div class="nav">
                    <a href="/">Landing</a>
                    <a href="{{ url_for('posts.my_posts') }}">My Posts</a>
                    <a href="{{ url_for('posts.create_template_post') }}">Create Post</a>
                </div>
            </div>
            <div class="card">
                <h3>Post stats</h3>
                <p>Use these fields later for dynamic counters.</p>
                <div class="stats">
                    <div class="stat">
                        <span>{{ post.views_count }} </span>
                        Views
                    </div>
                    <div class="stat">
                        <span>TEST</span>
                        Saves
                    </div>
                </div>
            </div>
        </section>

        <div class="section-title">
            <h2>Reading</h2>
        </div>
        <section class="card">
            {{ post.description }}
        </section>
    </div>
</main>
</body>
</html>
