<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="page">
    <div class="shell">
        <section class="hero">
            <div>
                <span class="pill">Create</span>
                <h1>Write something worth keeping.</h1>
                <p>Static form ready to become dynamic with a real submit action.</p>
                <div class="nav">
                    <a href="/">Landing</a>
                    <a href="/profile">Profile</a>
                    <a href="/my-posts">My Posts</a>
                </div>
            </div>
            <div class="card">
                <h3>Publishing checklist</h3>
                <p>Short, specific, visual. That is the tone.</p>
                <div class="stats">
                    <div class="stat">
                        <span>2-3</span>
                        Key ideas
                    </div>
                    <div class="stat">
                        <span>1</span>
                        Clear takeaway
                    </div>
                </div>
            </div>
        </section>

        <div class="section-title">
            <h2>New post</h2>
            <span class="tag">Static form</span>
        </div>
        <section class="card">
            <form class="form" action="{{ url_for('posts.create_template_post') }}" method="post">
                <div>
                    <label>Title</label>
                    <input type="text" placeholder="Give it a clear, short title" required name="title">
                </div>
                <div>
                    <label>Category</label>
                    <select name="category">
                        <option>Daily notes</option>
                        <option>Process log</option>
                        <option>Studio update</option>
                        <option>Field journal</option>
                    </select>
                </div>
                <div>
                    <label>Description</label>
                    <textarea placeholder="Write the main idea and supporting details..." name="description"></textarea>
                </div>
                <button class="button" type="submit">Publish draft</button>
            </form>
        </section>
    </div>
</main>
</body>
</html>
