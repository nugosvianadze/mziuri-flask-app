<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="page">
    <div class="shell">
        <section class="hero">
            <div>
                <span class="pill">Welcome back</span>
                <h1>Log in to your writing room.</h1>
                <p>Static preview only. Hook the form to your auth flow later.</p>
                <form class="form" action="{{ url_for('users.login') }}" method="post">
                    <div>
                        <label>Email address</label>
                        <input type="email" name="email" placeholder="hello@studio.app" required>
                    </div>
                    <div>
                        <label>Password</label>
                        <input type="password" name="password" placeholder="••••••••" minlength="6" required>
                    </div>
                    <button class="button" type="submit">Login</button>
                    {% if error %}
                        <span style="color: red;">{{ error }}</span>
                    {% endif %}
                </form>
            </div>
            <div class="card">
                <h3>Quick tips</h3>
                <p>Keep your sessions short and focused. This space is designed for deep work.</p>
                <div class="stats">
                    <div class="stat">
                        <span>8 min</span>
                        Average entry
                    </div>
                    <div class="stat">
                        <span>3 days</span>
                        Weekly streak
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
