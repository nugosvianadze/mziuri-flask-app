<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .logout-btn {
            display: block;
            width: 120px;
            margin: 25px auto 0;
            text-align: center;
            padding: 10px;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Home Page</h1>

    <table>
        <tr>
            <th>First Name</th>
            <td>{{ session.first_name }}</td>
        </tr>

        <tr>
            <th>Last Name</th>
            <td>{{ session.last_name }}</td>
        </tr>
    </table>

    {% if session.user_id %}
    <a href="{{ url_for('logout') }}" class="logout-btn">
        Logout
    </a>
    {% endif %}

</div>

</body>
</html>
